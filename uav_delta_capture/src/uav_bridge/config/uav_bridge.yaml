uav_bridge_node:
  ros__parameters:
    serial_port: /dev/ttyACM0
    baudrate: 57600
    camera_frame: camera_optical_frame
    target_frame: delta_base_link
    local_pose_topic: /mavros/local_position/pose
    imu_topic: /mavros/imu/data
    vision_offset_topic: vision/target_offset
    target_point_topic: target_point
    local_attitude_topic: uav_bridge/local_attitude
    imu_attitude_topic: uav_bridge/imu_attitude
